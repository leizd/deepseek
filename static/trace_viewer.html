<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trace Viewer - DeepSeek Infra</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --surface: #ffffff;
        --surface-soft: #f0f3ef;
        --ink: #171a1f;
        --muted: #667085;
        --border: #d8ded6;
        --accent: #2563eb;
        --agent: #0f766e;
        --tool: #a16207;
        --rag: #7c3aed;
        --llm: #2563eb;
        --cache: #15803d;
        --error: #b42318;
        --error-soft: #fff1f0;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      a {
        color: inherit;
      }

      .trace-page {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px clamp(16px, 4vw, 40px);
        border-bottom: 1px solid var(--border);
        background: rgba(247, 247, 244, 0.94);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: grid;
        gap: 2px;
      }

      .brand strong {
        font-size: 15px;
      }

      .brand span {
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--surface);
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      main {
        display: grid;
        gap: 18px;
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 22px clamp(16px, 4vw, 40px) 44px;
      }

      .status {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--muted);
      }

      .status.error {
        border-color: #f4b8b3;
        background: var(--error-soft);
        color: var(--error);
      }

      .headline {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: end;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        overflow-wrap: anywhere;
        font-size: 28px;
        line-height: 1.2;
      }

      h2 {
        font-size: 16px;
      }

      .subtle {
        color: var(--muted);
        font-size: 13px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 9px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .badge.error {
        border-color: #f4b8b3;
        background: var(--error-soft);
        color: var(--error);
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        gap: 10px;
      }

      .fact,
      .panel,
      .span-row,
      .tree-row {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .fact {
        display: grid;
        gap: 5px;
        min-height: 86px;
        padding: 13px;
      }

      .fact span {
        color: var(--muted);
        font-size: 12px;
      }

      .fact strong {
        overflow-wrap: anywhere;
        font-size: 19px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.4fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .category-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      .category-table th,
      .category-table td {
        padding: 9px 6px;
        border-bottom: 1px solid var(--border);
        text-align: right;
      }

      .category-table th:first-child,
      .category-table td:first-child {
        text-align: left;
      }

      .category-table th {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .tree-list,
      .waterfall-list,
      .error-list {
        display: grid;
        gap: 8px;
      }

      .tree-row {
        display: grid;
        gap: 5px;
        padding: 10px;
      }

      .tree-title {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .tree-title strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .kind-dot {
        width: 9px;
        height: 9px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--accent);
      }

      .kind-dot.agent {
        background: var(--agent);
      }

      .kind-dot.tool {
        background: var(--tool);
      }

      .kind-dot.rag {
        background: var(--rag);
      }

      .kind-dot.llm {
        background: var(--llm);
      }

      .kind-dot.cache {
        background: var(--cache);
      }

      .span-row {
        display: grid;
        grid-template-columns: minmax(180px, 0.9fr) minmax(240px, 1.5fr) minmax(120px, 0.45fr);
        gap: 12px;
        align-items: center;
        padding: 10px;
      }

      .span-name {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .span-name strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .lane {
        position: relative;
        height: 14px;
        border-radius: 999px;
        background: var(--surface-soft);
        overflow: hidden;
      }

      .bar {
        position: absolute;
        top: 0;
        bottom: 0;
        min-width: 8px;
        border-radius: inherit;
        background: var(--accent);
      }

      .bar.agent {
        background: var(--agent);
      }

      .bar.tool {
        background: var(--tool);
      }

      .bar.rag {
        background: var(--rag);
      }

      .bar.llm {
        background: var(--llm);
      }

      .bar.cache {
        background: var(--cache);
      }

      .span-metrics {
        color: var(--muted);
        font-size: 12px;
        text-align: right;
      }

      .error-list article {
        padding: 10px;
        border: 1px solid #f4b8b3;
        border-radius: var(--radius);
        background: var(--error-soft);
        color: var(--error);
        font-size: 13px;
      }

      .empty {
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 960px) {
        .headline,
        .grid {
          grid-template-columns: 1fr;
        }

        .facts {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .span-row {
          grid-template-columns: 1fr;
        }

        .span-metrics {
          text-align: left;
        }
      }

      @media (max-width: 560px) {
        .topbar,
        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .facts {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="trace-page">
      <header class="topbar">
        <div class="brand">
          <strong>DeepSeek Infra</strong>
          <span>Trace Viewer</span>
        </div>
        <div class="actions">
          <a class="button" href="/" id="homeLink">App</a>
          <a class="button primary" href="#" id="exportLink" download>Export JSON</a>
        </div>
      </header>

      <main>
        <div class="status" id="status">Loading trace...</div>
        <section class="headline" id="headline" hidden>
          <div>
            <h1 id="traceTitle">Trace</h1>
            <p class="subtle" id="traceSubtitle"></p>
          </div>
          <span class="badge" id="traceStatus">unknown</span>
        </section>

        <section class="facts" id="facts" hidden></section>

        <section class="grid" id="contentGrid" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>Span Tree</h2>
              <span class="subtle" id="spanCount"></span>
            </div>
            <div class="tree-list" id="spanTree"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h2>Waterfall</h2>
              <span class="subtle" id="traceWindow"></span>
            </div>
            <div class="waterfall-list" id="waterfall"></div>
          </div>
        </section>

        <section class="grid" id="summaryGrid" hidden>
          <div class="panel">
            <div class="panel-header">
              <h2>Runtime By Type</h2>
            </div>
            <div id="categorySummary"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h2>Errors</h2>
            </div>
            <div class="error-list" id="errors"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/modules/trace_viewer.js"></script>
  </body>
</html>
