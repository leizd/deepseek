<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- self-contained light card: readable on both GitHub light & dark themes -->
  <rect x="0" y="0" width="1200" height="700" rx="18" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="1199" height="699" rx="18" fill="none" stroke="#dbe3ee"/>

  <!-- header -->
  <text x="48" y="58" font-size="26" font-weight="700" fill="#0f172a">DeepSeek Infra</text>
  <text x="48" y="84" font-size="14" fill="#64748b">Local-first Agentic AI Infrastructure Platform — LLM Gateway · Agent DAG · MCP · A2A · Local RAG · Observability</text>
  <rect x="1078" y="38" width="74" height="28" rx="14" fill="#2563eb"/>
  <text x="1115" y="57" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">v2.1.6</text>

  <!-- clients layer -->
  <rect x="48" y="106" width="1104" height="72" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="64" y="124" font-size="10" letter-spacing="2" fill="#94a3b8">CLIENTS</text>
  <g font-size="13" fill="#334155" text-anchor="middle">
    <rect x="64" y="132" width="166" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="147" y="154">Web UI · PWA</text>
    <rect x="242" y="132" width="166" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="325" y="154">Desktop WebView</text>
    <rect x="420" y="132" width="166" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="503" y="154">Android APK</text>
    <rect x="598" y="132" width="178" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="687" y="154" fill="#1d4ed8">OpenAI SDK → /v1</text>
    <rect x="788" y="132" width="172" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="874" y="154" fill="#1d4ed8">MCP client → /mcp</text>
    <rect x="972" y="132" width="164" height="34" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="1054" y="154" fill="#1d4ed8">A2A peer → /a2a</text>
  </g>

  <!-- arrow clients -> runtime -->
  <line x1="600" y1="178" x2="600" y2="206" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="616" y="198" font-size="11" fill="#94a3b8">HTTP · NDJSON stream · SSE · JSON-RPC 2.0</text>

  <!-- runtime layer -->
  <rect x="48" y="210" width="1104" height="58" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="64" y="245" font-size="16" font-weight="600" fill="#0f172a">Local AI Runtime · FastAPI / ASGI</text>
  <text x="1136" y="245" font-size="12.5" fill="#64748b" text-anchor="end">Local-token Auth · Streaming · /healthz · /readyz · /metrics (Prometheus)</text>

  <!-- arrows runtime -> modules -->
  <line x1="232" y1="268" x2="232" y2="296" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="268" x2="600" y2="296" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="968" y1="268" x2="968" y2="296" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- module column 1: LLM Gateway -->
  <rect x="48" y="300" width="352" height="186" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="48" y="300" width="4" height="186" rx="2" fill="#3b82f6"/>
  <text x="72" y="328" font-size="15" font-weight="600" fill="#1d4ed8">LLM Gateway</text>
  <g font-size="12.5" fill="#334155">
    <text x="72" y="352">OpenAI-compatible /v1 · multi-provider</text>
    <text x="72" y="372">Model Router · cascade draft→refine</text>
    <text x="72" y="392">Request Scheduler · rate limit · DLQ</text>
    <text x="72" y="412">Prompt-cache-aware Context Engine</text>
    <text x="72" y="432">Semantic Cache · Cost &amp; Budget</text>
    <text x="72" y="452" fill="#b45309">Context Taint Firewall（注入防火墙）</text>
    <text x="72" y="472">Retry queue · edge-cloud fallback</text>
  </g>

  <!-- module column 2: Agent DAG Runtime -->
  <rect x="424" y="300" width="352" height="186" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="424" y="300" width="4" height="186" rx="2" fill="#8b5cf6"/>
  <text x="448" y="328" font-size="15" font-weight="600" fill="#6d28d9">Agent DAG Runtime</text>
  <g font-size="12.5" fill="#334155">
    <text x="448" y="352">Planner → DAG topological layers</text>
    <text x="448" y="372">Parallel workers · Critic revision loop</text>
    <text x="448" y="392">Event-sourced runs · resume / replay</text>
    <text x="448" y="412">Node state machine · token guardrails</text>
    <text x="448" y="432">A2A Agent Mesh · Agent Cards</text>
    <text x="448" y="452">Per-role capability slices</text>
  </g>

  <!-- module column 3: Tool Runtime -->
  <rect x="800" y="300" width="352" height="186" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="800" y="300" width="4" height="186" rx="2" fill="#10b981"/>
  <text x="824" y="328" font-size="15" font-weight="600" fill="#047857">Tool Calling Runtime</text>
  <g font-size="12.5" fill="#334155">
    <text x="824" y="352">17 local tools · docs / search / code</text>
    <text x="824" y="372" fill="#b45309">Tool Policy Engine · SSRF · path guard</text>
    <text x="824" y="392" fill="#b45309">Injection scrubbing · audit log</text>
    <text x="824" y="412">MCP Tool Hub · tools / resources / prompts</text>
    <text x="824" y="432">Sandboxed python_eval · file chunking</text>
    <text x="824" y="452">PPT / DOCX / PDF / mindmap renderers</text>
  </g>

  <!-- arrow modules -> data -->
  <line x1="600" y1="486" x2="600" y2="514" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- data layer -->
  <rect x="48" y="518" width="1104" height="86" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="64" y="536" font-size="10" letter-spacing="2" fill="#94a3b8">LOCAL DATA &amp; OBSERVABILITY · ALL ON-DEVICE</text>
  <g font-size="12.5" fill="#334155" text-anchor="middle">
    <rect x="64" y="548" width="236" height="40" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="182" y="566" fill="#047857" font-weight="600">SQLite Vector RAG</text>
    <text x="182" y="581" font-size="10.5" fill="#059669">BM25 hybrid · lineage · citations</text>
    <rect x="312" y="548" width="160" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="392" y="566">Long-term Memory</text>
    <text x="392" y="581" font-size="10.5" fill="#94a3b8">scoped · confirmed</text>
    <rect x="484" y="548" width="184" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="576" y="566">Trace Runs · Span Tree</text>
    <text x="576" y="581" font-size="10.5" fill="#94a3b8">waterfall · /metrics</text>
    <rect x="680" y="548" width="156" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="758" y="566">Semantic Cache</text>
    <text x="758" y="581" font-size="10.5" fill="#94a3b8">scoped · quality-gated</text>
    <rect x="848" y="548" width="168" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="932" y="566">Request Queue · DLQ</text>
    <text x="932" y="581" font-size="10.5" fill="#94a3b8">retry · backpressure</text>
    <rect x="1028" y="548" width="108" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1082" y="566">Budget</text>
    <text x="1082" y="581" font-size="10.5" fill="#94a3b8">daily ledger</text>
  </g>

  <!-- upstream boundary -->
  <line x1="48" y1="630" x2="1152" y2="630" stroke="#cbd5e1" stroke-dasharray="6 6"/>
  <text x="48" y="660" font-size="12" fill="#64748b">数据默认不出端 · 只有显式调用跨过这条线</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="690" y="642" width="150" height="32" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="765" y="663" fill="#1d4ed8">DeepSeek API</text>
    <rect x="852" y="642" width="140" height="32" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="922" y="663" fill="#1d4ed8">Tavily Search</text>
    <rect x="1004" y="642" width="148" height="32" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1078" y="663" fill="#334155">Ollama / Edge GGUF</text>
  </g>
</svg>
